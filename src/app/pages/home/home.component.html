<app-hero></app-hero>

<!-- Vehicle Thumbnail Strip -->
<section class="vehicle-strip">
  <div class="container">
    <div class="strip-header reveal">
      <span class="section-label">Our Premium Fleet</span>
      <h2>Every Vehicle, <span class="gold">Every Journey</span></h2>
    </div>
    <div class="strip-scroll">
      <div class="strip-card reveal" *ngFor="let v of vehicleStrip; let i = index" [style.transition-delay]="(i*0.07)+'s'">
        <div class="strip-img">
          <img [src]="v.img" [alt]="v.name" loading="lazy" />
        </div>
        <div class="strip-info">
          <span class="strip-type">{{v.type}}</span>
          <span class="strip-name">{{v.name}}</span>
          <span class="strip-seats">{{v.seats}} seats</span>
        </div>
      </div>
    </div>
  </div>
</section>

<app-fleet></app-fleet>
<app-services></app-services>

<!-- Why Choose Us -->
<section class="why-section">
  <div class="container">
    <div class="section-header reveal" style="text-align:center;margin-bottom:40px">
      <span class="section-label">Why Tawakkal</span>
      <h2>Travel With <span class="gold">Confidence</span></h2>
    </div>
    <div class="why-grid">
      <div class="why-card reveal" *ngFor="let w of whyUs; let i = index" [style.transition-delay]="(i*0.07)+'s'">
        <div class="why-icon">{{w.icon}}</div>
        <h3>{{w.title}}</h3>
        <p>{{w.desc}}</p>
      </div>
    </div>
  </div>
</section>

<app-enquiry></app-enquiry>
